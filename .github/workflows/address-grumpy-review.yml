name: Address grumpy review

on:
  workflow_run:
    workflows: ["Grumpy Code Reviewer 🔥"]
    types: [completed]

jobs:
  address:
    # Only run when the grumpy reviewer actually posted a review (succeeded)
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Get PR number from triggering workflow run
        id: get-pr
        uses: actions/github-script@v7
        with:
          script: |
            const run = await github.rest.actions.getWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: ${{ github.event.workflow_run.id }}
            });
            const prs = run.data.pull_requests;
            if (!prs || prs.length === 0) {
              core.setFailed('No PR found for triggering workflow run');
              return;
            }
            const pr = prs[0];
            core.setOutput('number', pr.number);
            core.setOutput('head_sha', pr.head.sha);
            core.setOutput('head_ref', pr.head.ref);
            console.log(`PR #${pr.number} — branch: ${pr.head.ref}`);

      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.get-pr.outputs.head_ref }}
          fetch-depth: 0

      - name: Set up git identity
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Address grumpy review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.get-pr.outputs.number }}
        run: |
          claude --print --permission-mode bypassPermissions \
            "Fetch PR #${PR_NUMBER} from repaskristoftamas/Bookstore-API. \
             Read all review comments on the PR. \
             Evaluate each concern: if it is a valid code quality issue, fix it in the codebase. \
             If a concern is not valid or is a matter of personal preference with no clear improvement, skip it. \
             After fixing valid concerns, run the tests to verify nothing is broken. \
             Commit any fixes using conventional commits. Do not push."

      - name: Push fixes
        run: git push origin ${{ steps.get-pr.outputs.head_ref }}
