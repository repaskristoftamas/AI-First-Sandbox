name: Address grumpy review

on:
  pull_request_review:
    types: [submitted]

jobs:
  address:
    # Filter to grumpy reviewer reviews only via the unique signature it embeds
    if: "contains(github.event.review.body, 'gh-aw-agentic-workflow: Grumpy Code Reviewer')"
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          token: ${{ secrets.WORKFLOW_PAT }}

      - name: Set up git identity
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Address grumpy review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          claude --print --permission-mode bypassPermissions \
            "/address-review-ci ${PR_NUMBER}"

      - name: Push fixes
        run: git push origin ${{ github.event.pull_request.head.ref }}
