name: Address grumpy review (self-hosted)

# Requires a self-hosted runner with Claude Code pre-installed and authenticated
# via subscription (claude auth login). No ANTHROPIC_API_KEY needed.
on:
  pull_request_review:
    types: [submitted]
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'Pull request number to address'
        required: true
        type: number

jobs:
  address:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.review.body, 'gh-aw-agentic-workflow: Grumpy Code Reviewer') ||
      (github.event.issue.pull_request && startsWith(github.event.comment.body, '/address'))
    runs-on: self-hosted
    defaults:
      run:
        shell: bash
    permissions:
      contents: write
      pull-requests: write
    outputs:
      number: ${{ steps.pr.outputs.number }}
      branch: ${{ steps.pr.outputs.branch }}
      author: ${{ steps.pr.outputs.author }}

    steps:
      - name: Resolve PR metadata
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            PR_NUMBER=${{ inputs.pr_number }}
          elif [ "${{ github.event_name }}" = "issue_comment" ]; then
            PR_NUMBER=${{ github.event.issue.number }}
          else
            PR_NUMBER=${{ github.event.pull_request.number }}
          fi
          BRANCH=$(gh pr view "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --json headRefName --jq '.headRefName')
          AUTHOR=$(gh pr view "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --json author --jq '.author.login')
          echo "number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
          echo "author=$AUTHOR" >> "$GITHUB_OUTPUT"

      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr.outputs.branch }}
          fetch-depth: 0
          token: ${{ secrets.GH_AW_GITHUB_TOKEN }}

      - name: Set up git identity
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

      # Claude Code uses subscription auth from ~/.claude/ on the runner machine.
      # No ANTHROPIC_API_KEY required.
      - name: Address grumpy review
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FOCUS_COMMENT: ${{ github.event_name == 'issue_comment' && github.event.comment.body || '' }}
        run: |
          if [ -n "$FOCUS_COMMENT" ]; then
            FOCUS_ARG=$(echo "$FOCUS_COMMENT" | sed 's|^/address ||')
            claude --print --permission-mode bypassPermissions \
              --model claude-opus-4-6 \
              "/address-review-ci ${{ steps.pr.outputs.number }} --focus $FOCUS_ARG"
          else
            claude --print --permission-mode bypassPermissions \
              --model claude-opus-4-6 \
              "/address-review-ci ${{ steps.pr.outputs.number }}"
          fi

      - name: Push fixes
        run: git push origin ${{ steps.pr.outputs.branch }}

      - name: Post reply comments
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FOCUS_COMMENT: ${{ github.event_name == 'issue_comment' && github.event.comment.body || '' }}
        run: |
          if [ -n "$FOCUS_COMMENT" ]; then
            FOCUS_ARG=$(echo "$FOCUS_COMMENT" | sed 's|^/address ||')
            claude --print --permission-mode bypassPermissions \
              --model claude-opus-4-6 \
              "/address-respond-ci ${{ steps.pr.outputs.number }} --focus $FOCUS_ARG"
          else
            claude --print --permission-mode bypassPermissions \
              --model claude-opus-4-6 \
              "/address-respond-ci ${{ steps.pr.outputs.number }}"
          fi

  review-back:
    needs: address
    if: needs.address.result == 'success'
    runs-on: self-hosted
    timeout-minutes: 15
    defaults:
      run:
        shell: bash
    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.address.outputs.branch }}
          fetch-depth: 0
          token: ${{ secrets.GH_AW_GITHUB_TOKEN }}

      - name: Review back on addressed comments
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          claude --print --permission-mode bypassPermissions \
            --model claude-opus-4-6 \
            "/review-back-ci ${{ needs.address.outputs.number }} ${{ needs.address.outputs.author }}"

      - name: Request human review
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr edit ${{ needs.address.outputs.number }} \
            --add-reviewer ${{ needs.address.outputs.author }}
