name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          cache: true
        env:
          DOTNET_INSTALL_DIR: /usr/share/dotnet

      - name: Restore
        run: dotnet restore Bookstore.slnx

      - name: Build
        run: dotnet build Bookstore.slnx --no-restore --configuration Release

      - name: Test
        run: dotnet test Bookstore.slnx --no-build --configuration Release --logger "console;verbosity=normal"
