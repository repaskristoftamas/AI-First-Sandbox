name: "Copilot Setup Steps"

# Automatically run when changed for validation, and allow manual testing
on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  # The job MUST be called `copilot-setup-steps` or it will not be picked up by Copilot.
  copilot-setup-steps:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
        env:
          DOTNET_INSTALL_DIR: /usr/share/dotnet

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Verify .NET version
        run: |
          echo "Installed .NET versions:"
          dotnet --list-sdks
          echo "Active version:"
          dotnet --version

      - name: Verify Node.js version
        run: |
          echo "Node.js version:"
          node --version
          echo "npm version:"
          npm --version

      - name: Restore backend dependencies
        run: dotnet restore src/backend/BookStore.slnx

      - name: Build backend solution
        run: dotnet build src/backend/BookStore.slnx --no-restore

      - name: Install frontend dependencies
        run: npm ci
        working-directory: src/frontend

      - name: Log environment info
        run: |
          echo "=== Copilot Setup Complete ==="
          echo "Date: $(date -Iseconds)"
          echo ".NET Version: $(dotnet --version)"
          echo "Node.js Version: $(node --version)"
          echo "npm Version: $(npm --version)"
          echo "User: $(whoami)"
          echo "Working Dir: $(pwd)"
