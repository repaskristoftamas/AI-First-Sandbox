services:
  bookstore-api:
    image: bookstore-api:latest
    container_name: bookstore-api
    build:
      context: .
      dockerfile: src/backend/Bookstore.WebApi/Dockerfile
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - DatabaseProvider=SqlServer
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=BookstoreDb;User Id=sa;Password=passWORD123;TrustServerCertificate=True
      - ConnectionStrings__PostgreSQL=Host=postgresql;Port=5432;Database=BookstoreDb;Username=bookstore;Password=passWORD123
    depends_on:
      sqlserver:
        condition: service_healthy

  sqlserver:
    container_name: bookstore-sqlserver
    image: mcr.microsoft.com/mssql/server:2022-latest
    ports:
      - "1435:1433"
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=passWORD123
    volumes:
      - sqlserver-data:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "passWORD123" -C -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  postgresql:
    container_name: bookstore-postgresql
    image: postgres:17
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_USER=bookstore
      - POSTGRES_PASSWORD=passWORD123
      - POSTGRES_DB=BookstoreDb
    volumes:
      - postgresql-data:/var/lib/postgresql/data
    healthcheck:
      test: pg_isready -U bookstore -d BookstoreDb
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  sqlserver-data:
  postgresql-data:
